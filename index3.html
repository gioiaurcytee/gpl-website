<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PPL Sitter Services QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>PPL Sitter Services</h1>
  <p>Scan to save our contact information</p>
  <canvas id="qrcode"></canvas>

  <script>
    const vcard = `BEGIN:VCARD
VERSION:3.0
N:PPL Sitter Services;;;;
FN:PPL Sitter Services
ORG:Postpartum Lifestyle
TITLE:Sitter Services
TEL;TYPE=CELL:3361234567
EMAIL:hello@pplsitterservices.com
URL:https://gioiaurcytee.com
NOTE:Reach out for sitter support, placement help, and family care inquiries.
END:VCARD`;

    QRCode.toCanvas(document.getElementById('qrcode'), vcard, {
      width: 260
    }, function (error) {
      if (error) console.error(error);
    });
  </script>
</body>
</html>
