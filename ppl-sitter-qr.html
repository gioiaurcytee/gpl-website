<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Postpartum Lifestyle LLC Sitter Services</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }

    #qrcode {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Postpartum Lifestyle LLC Sitter Services</h1>
  <p>Scan to save our contact information</p>
  <canvas id="qrcode"></canvas>

  <script>
    const vcard = `BEGIN:VCARD
VERSION:3.0
N:Postpartum Lifestyle LLC - Sitter Services;;;;
FN: Transitions, Tresses & Tots
ORG:Postpartum Lifestyle LLC
TITLE:Sitter/Nanny Services
TEL;TYPE=CELL:3363557155
EMAIL:admin@postpartumlifestyle.com
URL:https://www.postpartumlifestyle.com
NOTE:Reach out for sitter, birth, and/or postpartum support. We care for you, your crown and your crew.
END:VCARD`;

    QRCode.toCanvas(document.getElementById('qrcode'), vcard, {
      width: 260
    }, function (error) {
      if (error) console.error(error);
    });
  </script>
</body>
</html>
